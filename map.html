<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LegacyWoW Maps</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
  body { background: #111; color: #eee; font-family: Arial, sans-serif; margin: 0; }
  header { background: #222; padding: 10px; display: flex; align-items: center; }
  header a { color: #eee; margin-right: 15px; text-decoration: none; }
  #mapsContainer { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }

  /* Fixed map box size */
  .mapBox { 
    position: relative; 
    border: 2px solid #555; 
    background: #000; 
    overflow: hidden; 
    width: 1000px;   /* fixed width */
    height: 7500px;  /* fixed height */
  }

  canvas { 
    display: block; 
    width: 100%;    /* scale canvas to fit container */
    height: 100%; 
  }

  #cityPanel, #cityPanelOutland { 
    position: absolute; 
    top: 20px; 
    right: 20px; 
    background: rgba(0,0,0,0.8); 
    padding: 10px; 
    border: 1px solid #888; 
    display: none; 
    z-index: 10; 
  }

  .adminControls { 
    position: absolute; 
    bottom: 20px; 
    left: 20px; 
    background: rgba(0,0,0,0.8); 
    padding: 10px; 
    border: 1px solid #888; 
    display: none; 
    z-index: 10; 
  }
  .adminControls button, .adminControls input, .adminControls select { margin: 5px; }
</style>
</head>
<body>
<header>
  <a href="index.html">Back to LegacyWoW</a>
  <div>LegacyWoW Maps</div>
</header>

<div id="mapsContainer">
  <div class="mapBox" id="worldMapBox">
    <canvas id="worldMap"></canvas>
    <div id="cityPanel"></div>
    <div class="adminControls" id="worldAdmin">
      <label>Tool: 
        <select onchange="setTool(this.value,'world')">
          <option value="">None</option>
          <option value="marker">Marker</option>
          <option value="polygon">Polygon</option>
        </select>
      </label>
      <label>Icon: 
        <select onchange="setIcon(this.value,'world')">
          <option value="city">City</option>
          <option value="town">Town</option>
          <option value="fort">Fort</option>
          <option value="battle">Battle</option>
          <option value="tower">Tower</option>
        </select>
      </label>
      <label>Color: <input type="color" onchange="setColor(this.value,'world')" value="#ff0"></label>
      <button onclick="finishPolygon('world')">Finish Polygon</button>
      <button onclick="saveMap('world')">Save Map</button>
    </div>
  </div>

  <div class="mapBox" id="outlandMapBox">
    <canvas id="outlandMap"></canvas>
    <div id="cityPanelOutland"></div>
    <div class="adminControls" id="outlandAdmin">
      <label>Tool: 
        <select onchange="setTool(this.value,'outland')">
          <option value="">None</option>
          <option value="marker">Marker</option>
          <option value="polygon">Polygon</option>
        </select>
      </label>
      <label>Icon: 
        <select onchange="setIcon(this.value,'outland')">
          <option value="city">City</option>
          <option value="town">Town</option>
          <option value="fort">Fort</option>
          <option value="battle">Battle</option>
          <option value="tower">Tower</option>
        </select>
      </label>
      <label>Color: <input type="color" onchange="setColor(this.value,'outland')" value="#ff0"></label>
      <button onclick="finishPolygon('outland')">Finish Polygon</button>
      <button onclick="saveMap('outland')">Save Map</button>
    </div>
  </div>
</div>

<script src="/map/map-engine.js"></script>
<script>
  const isAdmin = new URLSearchParams(location.search).get("admin") === "1";

  if (isAdmin) {
    document.getElementById('worldAdmin').style.display = 'block';
    document.getElementById('outlandAdmin').style.display = 'block';
  }

  // Initialize maps
  initMap("worldMap","/assets/worldmap.jpg","world",isAdmin);
  initMap("outlandMap","/assets/outland.jpg","outland",isAdmin);
</script>
</body>
</html>
