<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AshenWoW Interactive Maps</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

/* TOP NAV BAR */

.topbar{
background:#111;
padding:10px 20px;
display:flex;
align-items:center;
gap:25px;
border-bottom:1px solid #333;
}

.topbar a{
color:white;
text-decoration:none;
font-weight:bold;
}

.topbar a:hover{
color:#f3c969;
}

/* MAP LAYOUT */

.map-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
padding:30px;
}

.map-box{
position:relative;
background:#1b1b1b;
border:2px solid #444;
padding:10px;
}

canvas{
background:black;
cursor:grab;
}

/* ADMIN PANEL */

.legend{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,.75);
border:1px solid #555;
padding:10px;
font-size:13px;
display:flex;
flex-direction:column;
gap:6px;
}

.legend button{
background:#333;
color:white;
border:1px solid #666;
padding:4px 6px;
cursor:pointer;
}

.legend input{
width:100%;
}

/* ZOOM */

.zoom{
position:absolute;
bottom:10px;
right:10px;
display:flex;
flex-direction:column;
}

.zoom button{
background:#222;
color:white;
border:1px solid #555;
font-size:18px;
width:32px;
height:32px;
}

/* CITY INFO PANEL */

.city-panel{
position:absolute;
bottom:20px;
left:20px;
background:#111;
border:1px solid #555;
padding:10px;
display:none;
width:200px;
}

/* MINIMAP */

.minimap{
position:absolute;
bottom:10px;
left:10px;
border:1px solid #555;
background:black;
opacity:.9;
}

</style>

</head>

<body>

<div class="topbar">
<a href="../index.html">Home</a>
<a href="../news.html">News</a>
<a href="../how-to-play.html">How to Play</a>
<a href="../rules.html">Rules</a>
<a href="../faq.html">FAQ</a>
<a href="map.html">World Map</a>
</div>

<div class="map-container">

<div class="map-box">

<canvas id="worldMap"></canvas>

<canvas class="minimap" id="worldMini" width="200" height="200"></canvas>

<div class="city-panel" id="cityPanel"></div>

<div class="legend" id="worldLegend">

<b>Admin Tools</b>

<button onclick="setTool('marker','world')">Add Marker</button> <button onclick="setTool('polygon','world')">Draw Territory</button>

<label>Color</label> <input type="color" onchange="setColor(this.value,'world')" value="#ffff00">

<label>Icon</label> <select onchange="setIcon(this.value,'world')">

<option value="city">City</option>
<option value="fort">Fort</option>
<option value="tower">Tower</option>
<option value="house">House</option>
<option value="battle">Battle</option>
</select>

<button onclick="finishPolygon('world')">Finish Territory</button>

</div>

<div class="zoom">
<button onclick="zoomMap('world',1.2)">+</button>
<button onclick="zoomMap('world',0.8)">−</button>
</div>

</div>

<div class="map-box">

<canvas id="outlandMap"></canvas>

<canvas class="minimap" id="outlandMini" width="200" height="200"></canvas>

<div class="legend" id="outlandLegend">

<b>Admin Tools</b>

<button onclick="setTool('marker','outland')">Add Marker</button> <button onclick="setTool('polygon','outland')">Draw Territory</button>

<label>Color</label> <input type="color" onchange="setColor(this.value,'outland')" value="#ffff00">

<label>Icon</label> <select onchange="setIcon(this.value,'outland')">

<option value="city">City</option>
<option value="fort">Fort</option>
<option value="tower">Tower</option>
<option value="house">House</option>
<option value="battle">Battle</option>
</select>

<button onclick="finishPolygon('outland')">Finish Territory</button>

</div>

<div class="zoom">
<button onclick="zoomMap('outland',1.2)">+</button>
<button onclick="zoomMap('outland',0.8)">−</button>
</div>

</div>

</div>

<script src="map-engine.js"></script>

<script>

const admin = new URLSearchParams(location.search).get("admin") === "1";

if(!admin){
document.getElementById("worldLegend").style.display="none";
document.getElementById("outlandLegend").style.display="none";
}

initMap("worldMap","../assets/worldmap.jpg","world",admin,"worldMini");
initMap("outlandMap","../assets/outland.jpg","outland",admin,"outlandMini");

</script>

</body>
</html>
