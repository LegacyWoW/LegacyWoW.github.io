<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LegacyWoW — Interactive Maps</title>
<style>
body { margin:0; background:#0a0a0a; color:#fff; font-family:Arial,sans-serif; }
header { background:#111; padding:10px; display:flex; align-items:center; }
header .logo img { height:50px; margin-right:10px; }
header nav a { color:white; margin:0 10px; text-decoration:none; }
.map-container { display:flex; flex-wrap:wrap; justify-content:center; padding:20px; gap:20px; }
.map-box { position:relative; background:#222; border:2px solid #444; width:800px; height:800px; }
canvas { display:block; width:100%; height:100%; background:#000; }
.admin-tools { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.8); padding:10px; border:1px solid #555; display:flex; flex-direction:column; gap:5px; z-index:10; }
.admin-tools button { padding:5px; color:#fff; background:#333; border:none; cursor:pointer; }
.admin-tools input[type=color] { width:100%; height:25px; border:none; cursor:pointer; }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="/assets/logo.png" alt="LegacyWoW"></div>
  <div style="flex:1">LegacyWoW — Interactive Maps</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="how-to-play.html">How to Play</a>
    <a href="news.html">News</a>
    <a href="rules.html">Rules</a>
    <a href="faq.html">FAQ</a>
    <a href="map.html">Map</a>
  </nav>
</header>

<div class="map-container">

  <!-- World Map -->
  <div class="map-box">
    <canvas id="worldMap"></canvas>
    <div id="worldAdmin" class="admin-tools">
      <button onclick="setTool('polygon','world')">Polygon Tool</button>
      <button onclick="setTool('marker','world')">Marker Tool</button>
      <label>Color: <input type="color" onchange="setColor(this.value,'world')" value="#ffff00"></label>
      <label>Icon:
        <select onchange="setIcon(this.value,'world')">
          <option value="city">City</option>
          <option value="fort">Fort</option>
          <option value="tower">Tower</option>
          <option value="house">House</option>
          <option value="battle">Battle</option>
        </select>
      </label>
    </div>
  </div>

  <!-- Outland Map -->
  <div class="map-box">
    <canvas id="outlandMap"></canvas>
    <div id="outlandAdmin" class="admin-tools">
      <button onclick="setTool('polygon','outland')">Polygon Tool</button>
      <button onclick="setTool('marker','outland')">Marker Tool</button>
      <label>Color: <input type="color" onchange="setColor(this.value,'outland')" value="#ffff00"></label>
      <label>Icon:
        <select onchange="setIcon(this.value,'outland')">
          <option value="city">City</option>
          <option value="fort">Fort</option>
          <option value="tower">Tower</option>
          <option value="house">House</option>
          <option value="battle">Battle</option>
        </select>
      </label>
    </div>
  </div>

</div>

<script src="/map/map-engine.js"></script>
<script>
const admin = new URLSearchParams(location.search).get("admin") === "1";

window.onload = function(){
    initMap("worldMap","/assets/worldmap.jpg","world",admin);
    initMap("outlandMap","/assets/outland.jpg","outland",admin);

    // Show admin panels if admin
    if(admin){
        document.getElementById("worldAdmin").style.display="flex";
        document.getElementById("outlandAdmin").style.display="flex";
    }
};
</script>

</body>
</html>
