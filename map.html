<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>LegacyWoW — Interactive Map</title>
<style>
  body { margin:0; background:#0a0a0a; color:#fff; font-family:Arial,sans-serif; }
  header { background:#111; padding:10px; display:flex; align-items:center; }
  header .logo img { height:50px; margin-right:10px; }
  header nav a { color:white; margin:0 10px; text-decoration:none; }
  .map-container { display:flex; flex-wrap:wrap; justify-content:center; padding:20px; gap:20px; }
  .map-box { position:relative; background:#222; border:2px solid #444; }
  canvas { display:block; background:#000; }
  .admin-tools { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:10px; border:1px solid #555; display:flex; flex-direction:column; gap:5px; }
  #cityPanel { font-size:14px; }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="/assets/logo.png" alt="LegacyWoW"></div>
  <div style="flex:1">LegacyWoW — Interactive Maps</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="how-to-play.html">How to Play</a>
    <a href="news.html">News</a>
    <a href="rules.html">Rules</a>
    <a href="faq.html">FAQ</a>
    <a href="map.html">Map</a>
  </nav>
</header>

<div class="map-container">
  <div class="map-box">
    <canvas id="worldMap"></canvas>
    <canvas id="worldMini" style="position:absolute; top:10px; right:10px; border:1px solid #555;"></canvas>
    <div id="worldAdmin" class="admin-tools" style="display:none;">
      <label>Polygon color: <input type="color" id="polyColor" value="#ffff00"></label>
      <button onclick="setTool('polygon')">Polygon Tool</button>
      <button onclick="setTool('marker')">Marker Tool</button>
      <button onclick="saveAll()">Save All</button>
      <button onclick="setIcon('city')">City</button>
      <button onclick="setIcon('fort')">Fort</button>
      <button onclick="setIcon('tower')">Tower</button>
      <button onclick="setIcon('house')">House</button>
      <button onclick="setIcon('battle')">Battle</button>
    </div>
  </div>

  <div class="map-box">
    <canvas id="outlandMap"></canvas>
    <canvas id="outlandMini" style="position:absolute; top:10px; right:10px; border:1px solid #555;"></canvas>
    <div id="outlandAdmin" class="admin-tools" style="display:none;">
      <label>Polygon color: <input type="color" id="polyColor" value="#00ff00"></label>
      <button onclick="setTool('polygon')">Polygon Tool</button>
      <button onclick="setTool('marker')">Marker Tool</button>
      <button onclick="saveAll()">Save All</button>
      <button onclick="setIcon('city')">City</button>
      <button onclick="setIcon('fort')">Fort</button>
      <button onclick="setIcon('tower')">Tower</button>
      <button onclick="setIcon('house')">House</button>
      <button onclick="setIcon('battle')">Battle</button>
    </div>
  </div>

  <div class="map-box">
    <canvas id="northrendMap"></canvas>
    <canvas id="northrendMini" style="position:absolute; top:10px; right:10px; border:1px solid #555;"></canvas>
    <div id="northrendAdmin" class="admin-tools" style="display:none;">
      <label>Polygon color: <input type="color" id="polyColor" value="#00ffff"></label>
      <button onclick="setTool('polygon')">Polygon Tool</button>
      <button onclick="setTool('marker')">Marker Tool</button>
      <button onclick="saveAll()">Save All</button>
      <button onclick="setIcon('city')">City</button>
      <button onclick="setIcon('fort')">Fort</button>
      <button onclick="setIcon('tower')">Tower</button>
      <button onclick="setIcon('house')">House</button>
      <button onclick="setIcon('battle')">Battle</button>
    </div>
  </div>
</div>

<script src="/map/map-engine.js"></script>

<script>
  const admin = new URLSearchParams(location.search).get("admin") === "1";

  if (admin) {
    document.getElementById("worldAdmin").style.display = "flex";
    document.getElementById("outlandAdmin").style.display = "flex";
    document.getElementById("northrendAdmin").style.display = "flex";
  }

  // Preload images and set canvas sizes dynamically
  function initMap(canvasId, miniId, imgSrc, mapKey) {
      const canvas = document.getElementById(canvasId);
      const mini = document.getElementById(miniId);
      const img = new Image();
      img.src = imgSrc;
      img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          createMap(canvasId, miniId, imgSrc, mapKey);
      }
  }

  initMap("worldMap","worldMini","/assets/worldmap.jpg","world");
  initMap("outlandMap","outlandMini","/assets/outland.jpg","outland");
  initMap("northrendMap","northrendMini","/assets/northrend.jpg","northrend");
</script>

</body>
</html>
