<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LegacyWoW — Interactive Maps</title>
<style>
body { margin:0; background:#0a0a0a; color:#fff; font-family:Arial,sans-serif; }
header { background:#111; padding:10px; display:flex; align-items:center; }
header .logo img { height:50px; margin-right:10px; }
header nav a { color:white; margin:0 10px; text-decoration:none; }
.map-container { display:flex; flex-wrap:wrap; justify-content:center; padding:20px; gap:20px; }
.map-box { position:relative; background:#222; border:2px solid #444; width:1200px; height:800px; }
canvas { display:block; width:100%; height:100%; background:#000; }
.admin-tools { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:10px; border:1px solid #555; display:flex; flex-direction:column; gap:5px; }
#cityPanel { font-size:14px; background:#111; padding:5px; position:absolute; top:10px; right:10px; display:none; border:1px solid #555; }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="/assets/logo.png" alt="LegacyWoW"></div>
  <div style="flex:1">LegacyWoW — Interactive Maps</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="how-to-play.html">How to Play</a>
    <a href="news.html">News</a>
    <a href="rules.html">Rules</a>
    <a href="faq.html">FAQ</a>
    <a href="map.html">Map</a>
  </nav>
</header>

<div class="map-container">
  <div class="map-box">
    <canvas id="worldMap"></canvas>
    <div id="worldAdmin" class="admin-tools" style="display:none;">
      <label>Polygon color: <input type="color" id="worldPolyColor" value="#ffff00"></label>
      <button onclick="setTool('polygon','world')">Polygon Tool</button>
      <button onclick="setTool('marker','world')">Marker Tool</button>
      <button onclick="saveAll()">Save All</button>
      <button onclick="setIcon('city','world')">City</button>
      <button onclick="setIcon('fort','world')">Fort</button>
      <button onclick="setIcon('tower','world')">Tower</button>
      <button onclick="setIcon('house','world')">House</button>
      <button onclick="setIcon('battle','world')">Battle</button>
    </div>
    <div id="cityPanel"></div>
  </div>

  <div class="map-box">
    <canvas id="outlandMap"></canvas>
    <div id="outlandAdmin" class="admin-tools" style="display:none;">
      <label>Polygon color: <input type="color" id="outlandPolyColor" value="#00ff00"></label>
      <button onclick="setTool('polygon','outland')">Polygon Tool</button>
      <button onclick="setTool('marker','outland')">Marker Tool</button>
      <button onclick="saveAll()">Save All</button>
      <button onclick="setIcon('city','outland')">City</button>
      <button onclick="setIcon('fort','outland')">Fort</button>
      <button onclick="setIcon('tower','outland')">Tower</button>
      <button onclick="setIcon('house','outland')">House</button>
      <button onclick="setIcon('battle','outland')">Battle</button>
    </div>
    <div id="cityPanel"></div>
  </div>

  <div class="map-box">
    <canvas id="northrendMap"></canvas>
    <div id="northrendAdmin" class="admin-tools" style="display:none;">
      <label>Polygon color: <input type="color" id="northrendPolyColor" value="#00ffff"></label>
      <button onclick="setTool('polygon','northrend')">Polygon Tool</button>
      <button onclick="setTool('marker','northrend')">Marker Tool</button>
      <button onclick="saveAll()">Save All</button>
      <button onclick="setIcon('city','northrend')">City</button>
      <button onclick="setIcon('fort','northrend')">Fort</button>
      <button onclick="setIcon('tower','northrend')">Tower</button>
      <button onclick="setIcon('house','northrend')">House</button>
      <button onclick="setIcon('battle','northrend')">Battle</button>
    </div>
    <div id="cityPanel"></div>
  </div>
</div>

<script src="/map/map-engine.js"></script>
<script>
  const admin = new URLSearchParams(location.search).get("admin") === "1";

  if(admin){
      document.getElementById("worldAdmin").style.display = "flex";
      document.getElementById("outlandAdmin").style.display = "flex";
      document.getElementById("northrendAdmin").style.display = "flex";
  }

  window.onload = function(){
      initMap("worldMap","/assets/worldmap.jpg","world");
      initMap("outlandMap","/assets/outland.jpg","outland");
      initMap("northrendMap","/assets/northrend.jpg","northrend");
  }
</script>

</body>
</html>
