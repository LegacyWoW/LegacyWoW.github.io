<!DOCTYPE html>
<html>
<head>
<title>LegacyWoW World Maps</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

#mapContainer{
width:90%;
max-width:1200px;
margin:auto;
position:relative;
}

#mapImage{
width:100%;
display:block;
}

.marker{
position:absolute;
transform:translate(-50%,-50%);
font-size:26px;
cursor:pointer;
}

.controls{
margin:20px;
}

button{
padding:10px 16px;
margin:4px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h1>LegacyWoW World Maps</h1>

<div class="controls">

<button onclick="switchMap('world')">Azeroth</button>
<button onclick="switchMap('outland')">Outland</button>
<button onclick="switchMap('northrend')">Northrend</button>

</div>

<div id="mapContainer">

<img id="mapImage" src="assets/worldmap.jpg">

</div>

<script>

const ADMIN = new URLSearchParams(window.location.search).get("admin") === "1";

let currentMap = "world";

const maps = {

world:"assets/worldmap.jpg",
outland:"assets/outland.jpg",
northrend:"assets/northrend.jpg"

};

function loadMarkers(){

document.querySelectorAll(".marker").forEach(m=>m.remove());

let markers = JSON.parse(localStorage.getItem("mapMarkers_"+currentMap)) || [];

markers.forEach((m,i)=>{

createMarker(m.x,m.y,m.name,m.icon,i);

});

}

function saveMarkers(list){

localStorage.setItem("mapMarkers_"+currentMap,JSON.stringify(list));

}

function createMarker(x,y,name,icon,index){

let marker=document.createElement("div");

marker.className="marker";

marker.style.left=x+"%";
marker.style.top=y+"%";

marker.innerHTML=icon;

marker.title=name;

document.getElementById("mapContainer").appendChild(marker);

}

function switchMap(map){

currentMap=map;

document.getElementById("mapImage").src = maps[map];

setTimeout(loadMarkers,200);

}

document.getElementById("mapContainer").addEventListener("click",function(e){

if(!ADMIN)return;

const rect=this.getBoundingClientRect();

let x=((e.clientX-rect.left)/rect.width)*100;
let y=((e.clientY-rect.top)/rect.height)*100;

let name=prompt("Marker Name:");

if(!name)return;

let icon=prompt("Icon (⚔️ 🏰 🏠 📍 etc):","📍");

let markers = JSON.parse(localStorage.getItem("mapMarkers_"+currentMap)) || [];

markers.push({x,y,name,icon});

saveMarkers(markers);

loadMarkers();

});

loadMarkers();

</script>

</body>
</html>
