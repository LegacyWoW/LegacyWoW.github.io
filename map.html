<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LegacyWoW Maps</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.wrap{
max-width:1200px;
margin:auto;
padding:10px;
}

.toprow{
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin-right:10px;
text-decoration:none;
font-weight:bold;
}

.map-tabs{
display:flex;
gap:10px;
margin:20px 0;
}

.map-btn{
padding:10px 16px;
border:none;
background:#222;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.map-btn.active{
background:#3cff8f;
color:black;
}

#mapContainer{
width:100%;
height:75vh;
border:2px solid #333;
border-radius:8px;
overflow:hidden;
}

.map{
width:100%;
height:100%;
display:none;
}

.map.active{
display:block;
}

.adminbar{
position:absolute;
top:120px;
right:20px;
z-index:9999;
display:flex;
gap:10px;
}

.btn{
padding:8px 14px;
border:none;
background:#333;
color:white;
cursor:pointer;
border-radius:6px;
}

</style>
</head>

<body>

<header>
<div class="wrap toprow">

<a href="index.html" style="color:white;text-decoration:none;font-weight:bold">
LegacyWoW Maps
</a>

<nav>
<a href="index.html">Home</a>
<a href="how-to-play.html">How to Play</a>
<a href="news.html">News</a>
<a href="rules.html">Rules</a>
<a href="faq.html">FAQ</a>
<a href="map.html">Map</a>
</nav>

</div>
</header>

<div class="wrap">

<div class="map-tabs">

<button class="map-btn active" onclick="switchMap('azeroth')">
World Map
</button>

<button class="map-btn" onclick="switchMap('outland')">
Outland
</button>

<button class="map-btn" onclick="switchMap('northrend')">
Northrend
</button>

</div>

<div id="mapContainer">

<div id="azeroth" class="map active"></div>
<div id="outland" class="map"></div>
<div id="northrend" class="map"></div>

</div>

<div class="adminbar" id="adminBar">
<button class="btn" onclick="exportMap()">Export</button>
<button class="btn" onclick="clearMap()">Clear</button>
</div>

</div>

<script>

const isAdmin = new URLSearchParams(location.search).get("admin") === "1"

const maps = {}
const drawnItems = {}

function createMap(id,image){

const map = L.map(id,{
crs:L.CRS.Simple,
minZoom:-2
})

const bounds=[[0,0],[4096,4096]]

L.imageOverlay(image,bounds).addTo(map)
map.fitBounds(bounds)

const drawn = new L.FeatureGroup()
map.addLayer(drawn)

maps[id]=map
drawnItems[id]=drawn

if(isAdmin){

const drawControl = new L.Control.Draw({
edit:{
featureGroup:drawn
},
draw:{
polygon:true,
marker:true,
rectangle:true,
circle:false,
polyline:false
}
})

map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){

const layer=e.layer

if(e.layerType==="marker"){
const name=prompt("Marker name?")
if(name) layer.bindPopup(name)
}

drawn.addLayer(layer)

saveMap(id)

})

map.on(L.Draw.Event.EDITED,()=>saveMap(id))
map.on(L.Draw.Event.DELETED,()=>saveMap(id))

}

loadMap(id)

}

function switchMap(id){

document.querySelectorAll(".map").forEach(m=>m.classList.remove("active"))
document.getElementById(id).classList.add("active")

document.querySelectorAll(".map-btn").forEach(b=>b.classList.remove("active"))
event.target.classList.add("active")

if(!maps[id]){

if(id==="azeroth") createMap(id,"/assets/worldmap.jpg")
if(id==="outland") createMap(id,"/assets/outland.jpg")
if(id==="northrend") createMap(id,"/assets/northrend.jpg")

}

setTimeout(()=>maps[id].invalidateSize(),100)

}

function saveMap(id){

const data=drawnItems[id].toGeoJSON()

localStorage.setItem("map_"+id,JSON.stringify(data))

}

function loadMap(id){

const data=localStorage.getItem("map_"+id)

if(!data) return

const geo=JSON.parse(data)

L.geoJSON(geo,{
onEachFeature:(feature,layer)=>{
if(feature.properties && feature.properties.popup){
layer.bindPopup(feature.properties.popup)
}
}
}).addTo(drawnItems[id])

}

function exportMap(){

const id=getActiveMap()

const data=localStorage.getItem("map_"+id)

alert(data)

}

function clearMap(){

const id=getActiveMap()

if(!confirm("Clear this map?")) return

drawnItems[id].clearLayers()

localStorage.removeItem("map_"+id)

}

function getActiveMap(){

if(document.getElementById("azeroth").classList.contains("active")) return "azeroth"
if(document.getElementById("outland").classList.contains("active")) return "outland"
return "northrend"

}

if(!isAdmin){
document.getElementById("adminBar").style.display="none"
}

createMap("azeroth","/assets/worldmap.jpg")

</script>

</body>
</html>
