<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LegacyWoW World Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

#map{
height:90vh;
width:100%;
}

#mapControls{
padding:10px;
background:#111;
border-bottom:1px solid #333;
}

select{
padding:6px;
font-size:14px;
}

</style>
</head>

<body>

<div id="mapControls">

Select Map:

<select id="mapSelector">
<option value="worldmap">Azeroth</option>
<option value="outland">Outland</option>
<option value="northrend">Northrend</option>
</select>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const adminMode = window.location.search.includes("admin=1")

let currentMapName = "worldmap"

const maps = {

worldmap:{
image:"assets/worldmap.jpg",
width:8192,
height:4096
},

outland:{
image:"assets/outland.jpg",
width:4096,
height:4096
},

northrend:{
image:"assets/northrend.jpg",
width:4096,
height:4096
}

}

let map
let imageLayer
let drawnItems

function loadMarkers(){

drawnItems.clearLayers()

const saved = localStorage.getItem("mapData_"+currentMapName)

if(saved){

const data = JSON.parse(saved)

L.geoJSON(data).eachLayer(layer=>{
drawnItems.addLayer(layer)
})

}

}

function saveMarkers(){

if(!adminMode) return

const data = drawnItems.toGeoJSON()

localStorage.setItem(
"mapData_"+currentMapName,
JSON.stringify(data)
)

}

function initMap(){

const config = maps[currentMapName]

map = L.map("map",{
crs:L.CRS.Simple,
minZoom:-5
})

const bounds = [[0,0],[config.height,config.width]]

imageLayer = L.imageOverlay(config.image,bounds).addTo(map)

map.fitBounds(bounds)

drawnItems = new L.FeatureGroup()

map.addLayer(drawnItems)

loadMarkers()

if(adminMode){

map.on("click",function(e){

const name = prompt("Marker name:")

if(!name) return

const marker = L.marker(e.latlng)

marker.bindPopup(name)

drawnItems.addLayer(marker)

saveMarkers()

})

}

}

initMap()

document.getElementById("mapSelector").addEventListener("change",function(){

currentMapName = this.value

map.remove()

initMap()

})

</script>

</body>
</html>
