<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LegacyWoW — Progressive Vanilla → Wrath</title>

  <style>
    :root{
      --bg:#0b0b0b;
      --text:#e8e8e8;
      --muted: rgba(232,232,232,.82);
      --line: rgba(255,255,255,.14);
      --glass: rgba(0,0,0,.45);
      --iceA: rgba(140,205,255,.9);
      --iceB: rgba(80,170,255,.85);
      --accent: rgba(80,170,255,.98);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, Arial;
      background: var(--bg);
      color: var(--text);
    }

    .wrap{max-width:1100px;margin:auto;padding:0 18px}

    #snowCanvas{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:9999;
    }

    header{
      border-bottom:1px solid rgba(255,255,255,.1);
      background:
        linear-gradient(180deg, rgba(0,0,0,.3), rgba(0,0,0,.9)),
        url("/assets/hero.jpg");
      background-size:cover;
      background-position:center;
    }

    .hero{padding:40px 0;text-align:center}

    .box{
      margin-top:16px;
      padding:18px;
      border:1px solid var(--line);
      background:var(--glass);
      border-radius:16px;
    }

    .title{
      font-weight:900;
      text-transform:uppercase;
      font-size:13px;
      opacity:.8;
      margin-bottom:10px;
    }

    .progress{
      margin-top:10px;
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      font-size:13px;
      margin-bottom:10px;
      opacity:.9;
      flex-wrap:wrap;
      gap:8px;
    }

    .chip{
      padding:3px 8px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(0,0,0,.25);
      font-weight:800;
    }

    .timeline{
      position:relative;
      height:70px;
    }

    .bar{
      position:absolute;
      top:28px;
      left:0;right:0;
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;
    }

    .bar-fill{
      height:100%;
      width:2%;
      background:linear-gradient(90deg,var(--iceA),var(--iceB));
      transition:width .4s ease;
    }

    .tick{
      position:absolute;
      width:2px;
      height:14px;
      top:26px;
      background:rgba(255,255,255,.35);
    }

    .tick.current{
      height:22px;
      top:22px;
      background:var(--accent);
    }

    .label{
      position:absolute;
      top:50px;
      transform:translateX(-50%);
      font-size:12px;
      opacity:.85;
      white-space:nowrap;
    }

    .current-label{
      position:absolute;
      top:0;
      transform:translateX(-50%);
      font-size:12px;
      font-weight:900;
      color:#fff;
      background:rgba(0,0,0,.3);
      padding:2px 6px;
      border-radius:8px;
      border:1px solid rgba(80,170,255,.5);
    }
  </style>
</head>

<body>
<canvas id="snowCanvas"></canvas>

<header>
<div class="wrap">

  <div class="hero">
    <h1>LegacyWoW</h1>

    <!-- ICECROWN -->
    <div class="box">
      <div class="title">Icecrown Progress</div>

      <div class="progress" data-current="2.4.3">
        <div class="progress-meta">
          <div>Current: <span class="currentText"></span> <span class="chip eraText"></span></div>
          <div>Goal: <span class="chip">3.4.0</span></div>
        </div>

        <div class="timeline">
          <div class="bar"><div class="bar-fill"></div></div>
        </div>
      </div>
    </div>

    <!-- DARROWMERE -->
    <div class="box">
      <div class="title">Darrowmere Progress</div>

      <div class="progress" data-current="1.0.0">
        <div class="progress-meta">
          <div>Current: <span class="currentText"></span> <span class="chip eraText"></span></div>
          <div>Goal: <span class="chip">3.3.5a</span></div>
        </div>

        <div class="timeline">
          <div class="bar"><div class="bar-fill"></div></div>
        </div>
      </div>
    </div>

  </div>
</div>
</header>

<script>
const PATCHES = [
  "1.0.0","1.1.0","1.3.3","1.5.2","1.6.2","1.7.1","1.9.4",
  "1.11.2","1.12.1","2.0.1","2.1.4","2.3.3","2.4.3",
  "3.0.2","3.1.3","3.2.2a","3.3.3","3.3.5a","3.4.0"
];

function getEra(p){
  if(p.startsWith("1")) return "Vanilla";
  if(p.startsWith("2")) return "TBC";
  if(p.startsWith("3.0") || p.startsWith("3.1") || p.startsWith("3.2") || p.startsWith("3.3")) return "WotLK";
  return "Custom";
}

function pct(i){ return (i/(PATCHES.length-1))*100; }

document.querySelectorAll(".progress").forEach(block=>{
  const current = block.dataset.current;
  const idx = Math.max(0, PATCHES.indexOf(current));
  const progress = pct(idx);

  const fill = block.querySelector(".bar-fill");
  const text = block.querySelector(".currentText");
  const era = block.querySelector(".eraText");
  const timeline = block.querySelector(".timeline");

  fill.style.width = Math.max(2, progress) + "%";
  text.textContent = current;
  era.textContent = getEra(current);

  PATCHES.forEach((p,i)=>{
    const t = document.createElement("div");
    t.className = "tick" + (p===current ? " current" : "");
    t.style.left = pct(i) + "%";
    timeline.appendChild(t);
  });

  const label = document.createElement("div");
  label.className = "current-label";
  label.style.left = progress + "%";
  label.textContent = current;
  timeline.appendChild(label);
});
</script>

</body>
</html>
