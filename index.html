<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Server Status</title>

<style>
body {
  background: #0b0f14;
  color: #e6f1ff;
  font-family: Arial, sans-serif;
  padding: 40px;
}

.server {
  margin-bottom: 60px;
}

h2 {
  margin-bottom: 10px;
}

.timeline {
  position: relative;
  margin-top: 25px;
}

.bar {
  height: 8px;
  background: #1e2a38;
  border-radius: 10px;
  position: relative;
}

.bar-fill {
  height: 100%;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  border-radius: 10px;
  width: 0%;
}

.tick {
  position: absolute;
  top: -4px;
  width: 2px;
  height: 16px;
  background: #6c7a89;
}

.tick.current {
  background: #00f2fe;
  height: 20px;
}

.current-patch-label {
  position: absolute;
  top: -25px;
  transform: translateX(-50%);
  font-size: 12px;
}

.major-label {
  position: absolute;
  top: 15px;
  transform: translateX(-50%);
  font-size: 11px;
  color: #9fb3c8;
}

.chip {
  background: #1e2a38;
  padding: 3px 8px;
  border-radius: 6px;
  margin-left: 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<!-- ICECROWN -->
<div class="server">
  <h2>Icecrown</h2>
  <b id="currentPatchLabel">2.4.3</b>
  <span class="chip" id="currentEraChip">TBC</span>

  <div class="timeline" id="timeline">
    <div class="bar">
      <div class="bar-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<!-- DARROWMERE -->
<div class="server">
  <h2>Darrowmere</h2>
  <b id="currentPatchLabel2">1.0.0</b>
  <span class="chip" id="currentEraChip2">Vanilla</span>

  <div class="timeline" id="timeline2">
    <div class="bar">
      <div class="bar-fill" id="progressFill2"></div>
    </div>
  </div>
</div>

<script>
const PATCHES = [
  { key:"1.0.0", era:"Vanilla" },
  { key:"1.1.0", era:"Vanilla" },
  { key:"1.3.3", era:"Vanilla" },
  { key:"1.5.2", era:"Vanilla" },
  { key:"1.6.2", era:"Vanilla" },
  { key:"1.7.1", era:"Vanilla" },
  { key:"1.9.4", era:"Vanilla" },
  { key:"1.11.2", era:"Vanilla" },
  { key:"1.12.1", era:"Vanilla" },
  { key:"2.0.1", era:"TBC" },
  { key:"2.1.4", era:"TBC" },
  { key:"2.3.3", era:"TBC" },
  { key:"2.4.3", era:"TBC" },
  { key:"3.0.2", era:"WOTLK" },
  { key:"3.1.3", era:"WOTLK" },
  { key:"3.2.2a", era:"WOTLK" },
  { key:"3.3.3", era:"WOTLK" },
  { key:"3.3.5a", era:"WOTLK" },
  { key:"3.4.0", era:"Custom" }
];

const MAJORS = [
  { key:"1.0.0", label:"1.0.0 Vanilla" },
  { key:"2.0.1", label:"2.0.1 TBC" },
  { key:"3.0.2", label:"3.0.2 WOTLK" },
  { key:"3.4.0", label:"3.4.0 Custom" }
];

// Set your server patches here
const CURRENT_PATCH = "2.4.3";   // Icecrown
const CURRENT_PATCH_2 = "1.0.0"; // Darrowmere

function indexOfKey(k){ 
  return PATCHES.findIndex(p => p.key === k); 
}

function toPct(i, totalSteps){
  return (i / totalSteps) * 100;
}

function buildProgress(currentPatch, timelineId, fillId, labelId, eraId){
  const idx = indexOfKey(currentPatch);
  const safeIdx = idx >= 0 ? idx : 0;
  const currentEra = PATCHES[safeIdx]?.era || "Vanilla";

  const totalSteps = PATCHES.length - 1;
  const pct = toPct(safeIdx, totalSteps);

  document.getElementById(labelId).textContent = currentPatch;
  document.getElementById(eraId).textContent = currentEra;

  const fillEl = document.getElementById(fillId);
  fillEl.style.width = Math.max(2, pct) + "%";

  const timelineEl = document.getElementById(timelineId);

  // ticks
  for (let i = 0; i < PATCHES.length; i++){
    const leftPct = toPct(i, totalSteps);
    const patch = PATCHES[i];

    const tick = document.createElement("div");
    tick.className = "tick" + (patch.key === currentPatch ? " current" : "");
    tick.style.left = leftPct + "%";
    timelineEl.appendChild(tick);
  }

  // current label
  const currentLabel = document.createElement("div");
  currentLabel.className = "current-patch-label";
  currentLabel.style.left = pct + "%";
  currentLabel.textContent = currentPatch;
  timelineEl.appendChild(currentLabel);

  // major labels
  for (const m of MAJORS){
    const mi = indexOfKey(m.key);
    if (mi < 0) continue;

    const lbl = document.createElement("div");
    lbl.className = "major-label";
    lbl.style.left = toPct(mi, totalSteps) + "%";
    lbl.textContent = m.label;
    timelineEl.appendChild(lbl);
  }
}

// Build both timelines
buildProgress(CURRENT_PATCH, "timeline", "progressFill", "currentPatchLabel", "currentEraChip");
buildProgress(CURRENT_PATCH_2, "timeline2", "progressFill2", "currentPatchLabel2", "currentEraChip2");
</script>

</body>
</html>
