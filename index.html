<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LegacyWoW — Progressive Vanilla → Wrath of the Lich King (3.3.5a)</title>

  <style>
    :root{
      --bg:#0b0b0b;
      --text:#e8e8e8;
      --muted: rgba(232,232,232,.82);
      --line: rgba(255,255,255,.14);
      --glass: rgba(0,0,0,.45);

      --iceA: rgba(140, 205, 255, .90);
      --iceB: rgba(80,  170, 255, .85);
      --accent: rgba(80, 170, 255, .98);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    a{color:#fff}

    .wrap{max-width:1100px;margin:0 auto;padding:0 18px}

    #snowCanvas{
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99999;
    }

    header{
      border-bottom:1px solid rgba(255,255,255,.10);
      background:
        linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.88)),
        url("/assets/hero.jpg");
      background-size:cover;
      background-position:center;
    }

    .toprow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      padding:16px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
      color:#fff;
      font-weight:900;
    }

    nav{display:flex;gap:10px;flex-wrap:wrap}
    nav a{
      color:#fff;text-decoration:none;font-weight:800;font-size:13px;
      padding:10px 12px;border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.28);
    }

    .hero{text-align:center;padding:34px 0 22px;}
    .hero h1{margin:0;font-size:44px}
    .hero p{color:var(--muted)}

    .btn{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:#fff;
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
    }

    .status-row{
      margin:18px auto 0;
      max-width:980px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .box{
      padding:18px 20px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--glass);
      backdrop-filter:blur(8px);
    }

    .title{font-weight:900;text-transform:uppercase;font-size:13px;margin-bottom:10px}

    .status-online{
      display:flex;
      gap:10px;
      font-size:18px;
      font-weight:900;
      color:var(--iceA);
    }

    .subline{
      margin-top:10px;
      padding:10px;
      border-radius:12px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.10);
      display:flex;
      justify-content:space-between;
    }

    .progress-wrap{
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.10);
    }

    .progress-labels{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      margin-bottom:10px;
    }

    .chip{
      padding:4px 8px;
      border-radius:10px;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.14);
      font-weight:900;
    }

    .timeline{position:relative;height:78px}

    .bar{
      position:absolute;
      top:28px;
      left:0;right:0;
      height:12px;
      border-radius:999px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.14);
      overflow:hidden;
    }

    .bar-fill{
      height:100%;
      width:3%;
      background:linear-gradient(90deg,var(--iceA),var(--iceB));
      transition:width .5s ease;
    }

    .tick{
      position:absolute;
      top:26px;
      width:2px;
      height:16px;
      background:rgba(255,255,255,.3);
    }

    .tick.current{
      height:24px;
      top:22px;
      background:var(--accent);
    }

    .current-patch-label{
      position:absolute;
      top:0;
      font-size:12px;
      font-weight:900;
      padding:3px 8px;
      border-radius:10px;
      background:rgba(0,0,0,.3);
      border:1px solid rgba(80,170,255,.6);
    }

    footer{
      text-align:center;
      padding:16px;
      opacity:.7;
      font-size:12px;
    }
  </style>
</head>

<body>
<canvas id="snowCanvas"></canvas>

<header>
<div class="wrap">

  <div class="hero">
    <h1>Progressive Vanilla → Wrath</h1>
    <p>LegacyWoW is a long-term progressive server.</p>

    <div class="status-row">

      <!-- ICECROWN -->
      <div class="box realm" data-patch="1.1.0">
        <div class="title">Server Status</div>
        <div class="status-online">ONLINE</div>

        <div class="subline">
          <div>Realm: <b>Icecrown</b></div>
          <div>Patch: <b class="patchText">1.1.0</b></div>
        </div>

        <div class="progress-wrap">
          <div class="progress-labels">
            <div>Current: <b class="currentPatchLabel"></b> <span class="chip currentEraChip"></span></div>
            <div>Goal: <b>3.4.0</b></div>
          </div>

          <div class="timeline">
            <div class="bar"><div class="bar-fill"></div></div>
          </div>
        </div>
      </div>

      <!-- DARROWMERE -->
      <div class="box realm" data-patch="1.0.0">
        <div class="title">Server Status</div>
        <div class="status-online">ONLINE</div>

        <div class="subline">
          <div>Realm: <b>Darrowmere</b></div>
          <div>Patch: <b class="patchText">1.0.0</b></div>
        </div>

        <div class="progress-wrap">
          <div class="progress-labels">
            <div>Current: <b class="currentPatchLabel"></b> <span class="chip currentEraChip"></span></div>
            <div>Goal: <b>3.3.5a</b></div>
          </div>

          <div class="timeline">
            <div class="bar"><div class="bar-fill"></div></div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>
</header>

<footer>© LegacyWoW</footer>

<script>
const PATCHES = [
  { key:"1.0.0", era:"Vanilla" },
  { key:"1.1.0", era:"Vanilla" },
  { key:"1.12.1", era:"Vanilla" },
  { key:"2.4.3", era:"TBC" },
  { key:"3.3.5a", era:"WOTLK" }
];

function index(k){ return PATCHES.findIndex(p=>p.key===k); }

document.querySelectorAll(".realm").forEach(realm=>{
  const patch = realm.dataset.patch;
  const i = Math.max(0,index(patch));
  const pct = (i/(PATCHES.length-1))*100;

  realm.querySelector(".patchText").textContent = patch;
  realm.querySelector(".currentPatchLabel").textContent = patch;
  realm.querySelector(".currentEraChip").textContent = PATCHES[i].era;

  realm.querySelector(".bar-fill").style.width = Math.max(5,pct)+"%";

  const timeline = realm.querySelector(".timeline");

  PATCHES.forEach((p,idx)=>{
    const t = document.createElement("div");
    t.className="tick"+(p.key===patch?" current":"");
    t.style.left=(idx/(PATCHES.length-1))*100+"%";
    timeline.appendChild(t);
  });

  const label=document.createElement("div");
  label.className="current-patch-label";
  label.textContent=patch;
  label.style.left=pct+"%";
  timeline.appendChild(label);
});
</script>

</body>
</html>
