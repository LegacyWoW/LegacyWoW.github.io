<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LegacyWoW — Progressive Vanilla → Wrath of the Lich King (3.3.5a)</title>

  <style>
    :root{
      --bg:#0b0b0b;
      --text:#e8e8e8;
      --muted: rgba(232,232,232,.82);
      --line: rgba(255,255,255,.14);
      --glass: rgba(0,0,0,.45);

      --iceA: rgba(140, 205, 255, .90);
      --iceB: rgba(80, 170, 255, .85);
      --accent: rgba(80, 170, 255, .98);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap{max-width:1100px;margin:0 auto;padding:0 18px}

    #snowCanvas{
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99999;
    }

    header{
      border-bottom:1px solid rgba(255,255,255,.10);
      background:
        linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.88)),
        url("/assets/hero.jpg");
      background-size:cover;
      background-position:center;
    }

    .toprow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      padding:16px 0;
    }

    nav{display:flex;gap:10px;flex-wrap:wrap}
    nav a{
      color:#fff;text-decoration:none;font-weight:800;font-size:13px;
      padding:10px 12px;border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.28);
    }

    .hero{text-align:center;padding:34px 0 22px}
    .hero h1{margin:0;font-size:44px}

    .status-row,
    .status-row-wide,
    .status-row-progress{
      margin:18px auto 0;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
    }

    .box{
      padding:18px 20px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--glass);
    }

    .title{
      font-size:13px;
      font-weight:900;
      margin-bottom:10px;
      opacity:.9;
      text-transform:uppercase;
    }

    .progress-wrap{
      margin-top:18px; /* ✅ FIX: creates separation from text */
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
    }

    .progress-labels{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      font-size:12.5px;
      margin-bottom:14px;
    }

    .chip{
      padding:4px 8px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.25);
      font-weight:900;
    }

    .timeline{
      position:relative;
      height:90px; /* ✅ FIX: more vertical space prevents overlap */
      width:100%;
      margin-top:10px;
    }

    .bar{
      position:absolute;
      left:0; right:0;
      top:30px;
      height:12px;
      border-radius:999px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.14);
      overflow:hidden;
    }

    .bar-fill{
      height:100%;
      width:5%;
      background: linear-gradient(90deg, var(--iceA), var(--iceB));
    }

    .tick{
      position:absolute;
      top:28px;
      width:2px;
      height:16px;
      background:rgba(255,255,255,.3);
    }

    .current-patch-label{
      position:absolute;
      top:0;
      transform:translateX(-50%);
      font-size:12px;
      padding:3px 8px;
      border-radius:10px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(80,170,255,.6);
      white-space:nowrap;
    }

    .major-label{
      position:absolute;
      top:55px;
      transform:translateX(-50%);
      font-size:12px;
      opacity:.85;
    }

    footer{
      text-align:center;
      padding:16px 0;
      opacity:.7;
    }
  </style>
</head>

<body>
<canvas id="snowCanvas"></canvas>

<header>
<div class="wrap">

  <div class="toprow">
    <div style="font-weight:900;">LegacyWoW</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">News</a>
      <a href="#">Downloads</a>
    </nav>
  </div>

  <div class="hero">
    <h1>Progressive Vanilla → Wrath</h1>

    <div class="status-row">
      <div class="box">
        <div class="title">Server Status</div>
        ONLINE
      </div>
    </div>

    <!-- ================= ICECROWN ================= -->
    <div class="status-row-progress">
      <div class="box">
        <div class="title">Icecrown Progress</div>

        <p>Progresses from 1.0.0 → 3.3.5a</p>

        <div class="progress-wrap">
          <div class="progress-labels">
            <div>Current: <b>2.4.3</b></div>
            <div>Goal: <b>3.3.5a</b></div>
          </div>

          <div class="timeline" data-current="2.4.3">
            <div class="bar"><div class="bar-fill"></div></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ================= DARROWMERE ================= -->
    <div class="status-row-progress">
      <div class="box">
        <div class="title">Darrowmere Progress</div>

        <p>Darrowmere is a progressive realm from 1.0.0 → 3.3.5a</p>

        <div class="progress-wrap">
          <div class="progress-labels">
            <div>Current: <b>1.0.0</b></div>
            <div>Goal: <b>3.3.5a</b></div>
          </div>

          <div class="timeline" data-current="1.0.0">
            <div class="bar"><div class="bar-fill"></div></div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
</header>

<footer>© LegacyWoW</footer>

<script>
const patches = ["1.0.0","1.1.0","1.3.3","1.5.2","1.6.2","1.7.1","1.9.4","1.12.1","2.0.1","2.4.3","3.0.2","3.3.5a"];

function pct(i){ return (i/(patches.length-1))*100; }

document.querySelectorAll(".timeline").forEach(timeline=>{
  const current = timeline.dataset.current;
  const idx = patches.indexOf(current);

  timeline.querySelector(".bar-fill").style.width = pct(idx)+"%";

  const label = document.createElement("div");
  label.className="current-patch-label";
  label.style.left = pct(idx)+"%";
  label.textContent=current;
  timeline.appendChild(label);

  patches.forEach((p,i)=>{
    const tick=document.createElement("div");
    tick.className="tick";
    tick.style.left=pct(i)+"%";
    timeline.appendChild(tick);
  });
});
</script>

</body>
</html>
