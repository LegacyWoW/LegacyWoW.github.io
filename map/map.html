<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>LegacyWoW Interactive Map</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

/* TOP NAV *//

.topbar{
background:#111;
padding:10px 20px;
display:flex;
gap:25px;
border-bottom:1px solid #333;
}

.topbar a{
color:white;
text-decoration:none;
font-weight:bold;
}

.topbar a:hover{
color:#e7c26b;
}

/* MAP AREA */

.map-container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding:30px;
}

.map-box{
position:relative;
background:#1b1b1b;
border:2px solid #444;
padding:10px;
width:1200px;
}

canvas{
display:block;
width:100%;
height:auto;
background:black;
cursor:grab;
}

/* ADMIN PANEL */

.legend{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,.75);
border:1px solid #555;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
font-size:13px;
}

.legend button{
background:#333;
color:white;
border:1px solid #666;
padding:4px 6px;
cursor:pointer;
}

.zoom{
position:absolute;
bottom:10px;
right:10px;
display:flex;
flex-direction:column;
}

.zoom button{
background:#222;
color:white;
border:1px solid #555;
width:32px;
height:32px;
font-size:18px;
}

</style>

</head>

<body>

<div class="topbar">
<a href="../index.html">Home</a>
<a href="../news.html">News</a>
<a href="../how-to-play.html">How to Play</a>
<a href="../rules.html">Rules</a>
<a href="../faq.html">FAQ</a>
<a href="map.html">World Map</a>
</div>

<div class="map-container">

<div class="map-box">

<canvas id="worldMap"></canvas>

<div class="legend" id="worldLegend">

<b>Admin Tools</b>

<button onclick="setTool('marker','world')">Add Marker</button> <button onclick="setTool('polygon','world')">Draw Territory</button>

<label>Color</label> <input type="color" onchange="setColor(this.value,'world')" value="#ffff00">

<button onclick="finishPolygon('world')">Finish Territory</button>

<button onclick="saveMap('world')">Save Map</button>

</div>

<div class="zoom">
<button onclick="zoomMap('world',1.2)">+</button>
<button onclick="zoomMap('world',0.8)">−</button>
</div>

</div>

<div class="map-box">

<canvas id="outlandMap"></canvas>

<div class="legend" id="outlandLegend">

<b>Admin Tools</b>

<button onclick="setTool('marker','outland')">Add Marker</button> <button onclick="setTool('polygon','outland')">Draw Territory</button>

<label>Color</label> <input type="color" onchange="setColor(this.value,'outland')" value="#ffff00">

<button onclick="finishPolygon('outland')">Finish Territory</button>

<button onclick="saveMap('outland')">Save Map</button>

</div>

<div class="zoom">
<button onclick="zoomMap('outland',1.2)">+</button>
<button onclick="zoomMap('outland',0.8)">−</button>
</div>

</div>

</div>

<script src="map-engine.js"></script>

<script>

const admin = new URLSearchParams(location.search).get("admin") === "1";

if(!admin){
document.getElementById("worldLegend").style.display="none";
document.getElementById("outlandLegend").style.display="none";
}

initMap("worldMap","../assets/worldmap.jpg","world",admin);
initMap("outlandMap","../assets/outland.jpg","outland",admin);

</script>

</body>
</html>
