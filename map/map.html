<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LegacyWoW — Maps</title>
<link rel="stylesheet" href="/assets/map-style.css">
<style>
body { margin:0; font-family: Arial, sans-serif; background:#111; color:#fff; }
header { background:#222; padding:10px; display:flex; align-items:center; justify-content:space-between; }
header a { color:#fff; text-decoration:none; margin-right:15px; }
.mapBox { position: relative; border: 2px solid #555; overflow: hidden; width: 1200px; height: 900px; margin:20px auto; background:#000; }
.cityPanel { position:absolute; background:#222; padding:8px; border:1px solid #fff; display:none; z-index:2000; pointer-events:none; }
.adminControls { position:absolute; top:10px; right:10px; background: rgba(0,0,0,0.8); padding:10px; z-index:1000; display:none; }
.adminControls button, select, input { margin:5px; }
</style>
</head>
<body>
<header>
  <a href="index.html">← Back to LegacyWoW Home</a>
  <nav>
    <a href="how-to-play.html">How to Play</a>
    <a href="news.html">News</a>
    <a href="map.html">Map</a>
  </nav>
</header>

<div class="mapBox" id="worldMapBox">
  <canvas id="worldMapCanvas" width="1200" height="900"></canvas>
  <div class="cityPanel" id="cityInfoPanel"></div>
  <div class="adminControls" id="adminControlsWorld">
    <button onclick="setTool('marker','worldMap')">Marker</button>
    <button onclick="setTool('polygon','worldMap')">Polygon</button>
    <select onchange="setIcon(this.value,'worldMap')">
      <option value="city">City</option>
      <option value="town">Town</option>
      <option value="fort">Fort</option>
      <option value="battle">Battle</option>
      <option value="tower">Tower</option>
    </select>
    <input type="color" onchange="setColor(this.value,'worldMap')" value="#ff0">
    <button onclick="finishPolygon('worldMap')">Finish Polygon</button>
    <button onclick="exportMap('worldMap')">Export</button>
  </div>
</div>

<div class="mapBox" id="outlandMapBox">
  <canvas id="outlandMapCanvas" width="1200" height="900"></canvas>
  <div class="cityPanel" id="cityInfoPanel2"></div>
  <div class="adminControls" id="adminControlsOutland">
    <button onclick="setTool('marker','outlandMap')">Marker</button>
    <button onclick="setTool('polygon','outlandMap')">Polygon</button>
    <select onchange="setIcon(this.value,'outlandMap')">
      <option value="city">City</option>
      <option value="town">Town</option>
      <option value="fort">Fort</option>
      <option value="battle">Battle</option>
      <option value="tower">Tower</option>
    </select>
    <input type="color" onchange="setColor(this.value,'outlandMap')" value="#ff0">
    <button onclick="finishPolygon('outlandMap')">Finish Polygon</button>
    <button onclick="exportMap('outlandMap')">Export</button>
  </div>
</div>

<script src="/map/map-engine.js"></script>
<script>
const isAdmin = new URLSearchParams(location.search).get("admin")==='1';
if(isAdmin){
  document.getElementById('adminControlsWorld').style.display='block';
  document.getElementById('adminControlsOutland').style.display='block';
}

// Initialize maps
initMap('worldMapCanvas','/assets/worldmap.jpg','worldMap',isAdmin);
initMap('outlandMapCanvas','/assets/outland.jpg','outlandMap',isAdmin);

// Center maps on load
function centerMap(mapKey){
  const map = maps[mapKey];
  const canvas = map.canvas;
  const img = map.img;

  const zoomX = canvas.width / img.width;
  const zoomY = canvas.height / img.height;
  map.zoom = Math.min(zoomX, zoomY);

  map.panX = (canvas.width - img.width*map.zoom)/2;
  map.panY = (canvas.height - img.height*map.zoom)/2;

  drawMap(mapKey);
}

maps['worldMap'].img.onload = ()=>{
  centerMap('worldMap');
  centerMap('outlandMap');
}

// Correct drag calculation per map
function setupDrag(mapKey){
  const map = maps[mapKey];
  let dragging=false;
  let lastMouseX=0,lastMouseY=0;

  map.canvas.addEventListener('mousedown', e=>{
    if(!isAdmin) return;
    dragging=true;
    const rect = map.canvas.getBoundingClientRect();
    lastMouseX = e.clientX - rect.left;
    lastMouseY = e.clientY - rect.top;
  });

  map.canvas.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const rect = map.canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    // Calculate delta properly with zoom
    const dx = (mouseX - lastMouseX);
    const dy = (mouseY - lastMouseY);

    map.panX += dx;
    map.panY += dy;

    lastMouseX = mouseX;
    lastMouseY = mouseY;

    drawMap(mapKey);
    drawCities();
    drawPolygons(mapKey);
  });

  map.canvas.addEventListener('mouseup', ()=>dragging=false);
  map.canvas.addEventListener('mouseleave', ()=>dragging=false);
}

setupDrag('worldMap');
setupDrag('outlandMap');

// Polygon naming and export
function finishPolygon(mapKey){
  const map = maps[mapKey];
  if(!map.currentPolygon || map.currentPolygon.length<3) return;
  const name = prompt("Enter polygon name:");
  map.currentPolygon.name = name || "Unnamed";
  map.polygons.push(map.currentPolygon);
  map.currentPolygon = [];
  drawPolygons(mapKey);
}

function exportMap(mapKey){
  const map = maps[mapKey];
  const geojson = {
    type: "FeatureCollection",
    features: map.polygons.map(p=>({
      type:"Feature",
      properties:{name:p.name,color:p.color},
      geometry:{type:"Polygon",coordinates:[p.points]}
    }))
  };
  const blob = new Blob([JSON.stringify(geojson,null,2)],{type:"application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "overlays.geojson";
  a.click();
}

// Enable polygons for admins
function enablePolygonEditing(mapKey){
  if(!isAdmin) return;
  const map = maps[mapKey];
  map.editPolygons = true;
  map.namePolygons = true;
}
enablePolygonEditing('worldMap');
enablePolygonEditing('outlandMap');
</script>
</body>
</html>
