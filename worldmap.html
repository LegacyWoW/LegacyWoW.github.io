<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LegacyWoW — World Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<style>
body {margin:0; background:#0b0b0b; color:white; font-family:Arial;}
.wrap {max-width:1200px; margin:auto; padding:10px;}
.toprow {display:flex; justify-content:space-between; align-items:center;}
nav a {color:white; margin-right:10px; text-decoration:none; font-weight:bold;}
#map {width:100%; height:75vh; border:2px solid #333; border-radius:8px;}
.adminbar {position:absolute; top:120px; right:20px; z-index:9999; display:flex; gap:10px;}
.btn {padding:8px 14px; border:none; background:#333; color:white; cursor:pointer; border-radius:6px;}
</style>
</head>
<body>

<header>
<div class="wrap toprow">
<a class="brand" href="index.html">LegacyWoW — World Map</a>
<nav>
<a href="index.html">Home</a>
<a href="how-to-play.html">How to Play</a>
<a href="news.html">News</a>
<a href="rules.html">Rules</a>
<a href="faq.html">FAQ</a>
<a href="worldmap.html">World Map</a>
<a href="outlandmap.html">Outland</a>
<a href="northrendmap.html">Northrend</a>
</nav>
</div>
</header>

<div class="wrap">
<div id="map"></div>
<div class="adminbar" id="adminBar">
<button class="btn" id="exportBtn">Export</button>
<button class="btn" id="clearBtn">Clear</button>
</div>
</div>

<script>
const map = L.map('map', {crs:L.CRS.Simple, minZoom:-2});
const bounds = [[0,0],[4096,4096]];
L.imageOverlay('/assets/worldmap.jpg', bounds).addTo(map);
map.fitBounds(bounds);

const drawn = new L.FeatureGroup();
map.addLayer(drawn);

const isAdmin = new URLSearchParams(location.search).get("admin")==="1";

if(isAdmin){
const drawControl = new L.Control.Draw({edit:{featureGroup:drawn}});
map.addControl(drawControl);

map.on(L.Draw.Event.CREATED, e=>{
  const layer=e.layer;
  if(e.layerType==="marker"){
    const name=prompt("Marker name?");
    if(name) layer.bindPopup(name);
  }
  drawn.addLayer(layer);
  saveMap();
});

map.on(L.Draw.Event.EDITED, saveMap);
map.on(L.Draw.Event.DELETED, saveMap);
}

if(!isAdmin) document.getElementById("adminBar").style.display="none";

function saveMap(){
  localStorage.setItem("map_world", JSON.stringify(drawn.toGeoJSON()));
}

function loadMap(){
  const data=localStorage.getItem("map_world");
  if(!data) return;
  L.geoJSON(JSON.parse(data), {onEachFeature:(f,l)=>{if(f.properties && f.properties.popup) l.bindPopup(f.properties.popup);}}).addTo(drawn);
}

loadMap();
</script>
</body>
</html>
